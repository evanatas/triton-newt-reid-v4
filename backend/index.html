<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тритоны — демо re-id</title>
<style>
  :root { --bg:#12141a; --card:#1c1f28; --ink:#e8eaf0; --mut:#9aa0ad; --acc:#2fce6b; --line:#2a2e3a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:24px 18px 60px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 20px; font-size:13px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:18px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button { background:var(--acc); color:#08140b; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:#2a2e3a; color:var(--ink); }
  button:disabled { opacity:.5; cursor:default; }
  input[type=file] { color:var(--mut); }
  .samples img { width:76px; height:76px; object-fit:cover; border-radius:8px; border:2px solid var(--line); cursor:pointer; }
  .samples img:hover { border-color:var(--acc); }
  .samp { text-align:center; font-size:11px; color:var(--mut); }
  #status { color:var(--mut); font-size:13px; min-height:18px; }
  .grid { display:grid; grid-template-columns:220px 1fr; gap:18px; margin-top:8px; }
  .probe img, .res img { width:100%; border-radius:8px; border:1px solid var(--line); }
  .res-item { background:#161922; border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:10px; }
  .res-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .iid { font-weight:700; font-size:16px; }
  .best { color:var(--acc); }
  .score { color:var(--mut); font-size:13px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:600; }
  .ok { background:#123d22; color:var(--acc); }
  .bad { background:#3d1b12; color:#ff8a6a; }
  .muted { color:var(--mut); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🦎 Тритоны — определение особи по узору брюшка</h1>
  <p class="sub">Демо ядра re-id (SIFT + affine + rolling). Загрузите фото брюшка или выберите пример — система найдёт
     наиболее похожих особей из каталога и покажет совпавшие точки узора. <span id="catn"></span></p>

  <div class="panel">
    <div class="row">
      <input type="file" id="file" accept="image/*">
      <button id="go">Определить</button>
      <span id="status"></span>
    </div>
    <div style="margin-top:14px">
      <div class="muted" style="margin-bottom:6px">Или попробуйте пример (клик):</div>
      <div class="row samples" id="samples"></div>
    </div>
  </div>

  <div id="out"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const status = t => $("#status").textContent = t || "";

async function loadSamples() {
  try {
    const r = await fetch("/samples"); const d = await r.json();
    $("#samples").innerHTML = "";
    for (const s of d.samples) {
      const w = document.createElement("div");
      w.innerHTML = `<img src="${s.thumb_b64}" title="запросить как пример"><div class="samp">${s.individual_id}</div>`;
      w.querySelector("img").onclick = () => runSample(s.frame_id);
      $("#samples").appendChild(w);
    }
  } catch (e) { /* каталог ещё грузится */ }
}

function render(d) {
  const meta = d.meta || {};
  let head = "";
  if (meta.sample) {
    const ok = meta.top1_correct;
    head = `<div class="panel"><b>Пример ${meta.sample}</b> · истинная особь <b>${meta.true_individual}</b>
      <span class="badge ${ok?'ok':'bad'}">${ok?'✓ top-1 верно':'top-1 мимо'}</span></div>`;
  } else if (meta.seg_method) {
    head = `<div class="panel muted">сегментация: ${meta.seg_method} · маска ${meta.mask_frac} · метка: ${meta.has_label?'найдена и закрашена':'нет'}</div>`;
  }
  let res = "";
  d.results.forEach((r, i) => {
    res += `<div class="res-item">
      <div class="res-head"><span class="iid ${i===0?'best':''}">#${i+1} · ${r.individual_id}</span>
        <span class="score">score ${r.score} · inliers ${r.inliers}</span></div>
      <div class="res"><img src="${r.overlay_b64}" alt="overlay"></div>
      <div class="muted">слева — кадр каталога (${r.gallery_frame}), справа — запрос; зелёные линии = совпавшие точки узора</div>
    </div>`;
  });
  $("#out").innerHTML = head + `<div class="grid">
      <div class="probe panel"><div class="muted" style="margin-bottom:6px">Запрос (кроп брюшка)</div>
        <img src="${d.probe_crop_b64}"></div>
      <div><div class="muted" style="margin-bottom:6px">Топ-${d.results.length} из ${d.n_catalog_individuals} особей каталога</div>${res}</div>
    </div>`;
}

async function runSample(fid) {
  status("считаю…"); $("#go").disabled = true;
  try { const r = await fetch("/sample/" + fid); render(await r.json()); status(""); }
  catch (e) { status("ошибка: " + e); }
  $("#go").disabled = false;
}

$("#go").onclick = async () => {
  const f = $("#file").files[0];
  if (!f) { status("выберите файл или пример"); return; }
  status("сегментация + матчинг… (~2–4 с)"); $("#go").disabled = true;
  try {
    const fd = new FormData(); fd.append("file", f);
    const r = await fetch("/identify", { method:"POST", body:fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    render(await r.json()); status("");
  } catch (e) { status("ошибка: " + e.message); }
  $("#go").disabled = false;
};

loadSamples();
</script>
</body>
</html>
